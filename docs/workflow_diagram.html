<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 24px; background: #ffffff; }
  svg { display: block; }
  .t { font: 400 14px -apple-system, sans-serif; fill: #26215C; }
  .th { font: 500 14px -apple-system, sans-serif; fill: #26215C; }
  .ts { font: 400 12px -apple-system, sans-serif; fill: #534AB7; }
  .box { fill: #F1EFE8; stroke: #888780; }
  .box .t, .box .th { fill: #2C2C2A; }
  .box .ts { fill: #5F5E5A; }
  .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal .th { fill: #04342C; }
  .c-teal .ts { fill: #085041; }
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th { fill: #26215C; }
  .c-purple .ts { fill: #3C3489; }
  .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral .th { fill: #4A1B0C; }
  .c-coral .ts { fill: #712B13; }
  .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
</style>
</head>
<body>
<svg width="680" height="676" viewBox="0 0 680 676" xmlns="http://www.w3.org/2000/svg">
<title>Trading Agent LangGraph 워크플로우</title>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<line x1="340" y1="56" x2="340" y2="116" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="172" x2="340" y2="232" class="arr" marker-end="url(#arrow)"/>

<path d="M340 288 L340 323 L140 323 L140 358" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="288" x2="340" y2="358" class="arr" marker-end="url(#arrow)"/>
<path d="M340 288 L340 323 L540 323 L540 358" class="arr" marker-end="url(#arrow)"/>

<path d="M140 414 L140 449 L340 449 L340 484" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="414" x2="340" y2="484" class="arr" marker-end="url(#arrow)"/>
<path d="M540 414 L540 449 L340 449 L340 484" class="arr" marker-end="url(#arrow)"/>

<line x1="340" y1="540" x2="340" y2="600" class="arr" marker-end="url(#arrow)"/>

<g class="box">
<rect x="290" y="20" width="100" height="36" rx="18" stroke-width="0.5"/>
<text class="t" x="340" y="42" text-anchor="middle">시작</text>
</g>

<g class="box">
<rect x="230" y="116" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="138" text-anchor="middle">가드레일</text>
<text class="ts" x="340" y="156" text-anchor="middle">입력검증·속도제한</text>
</g>

<g class="box">
<rect x="230" y="232" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="254" text-anchor="middle">라우터</text>
<text class="ts" x="340" y="272" text-anchor="middle">3가지 의도로 분기</text>
</g>

<g class="c-teal">
<rect x="50" y="358" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="140" y="380" text-anchor="middle">대시보드</text>
<text class="ts" x="140" y="398" text-anchor="middle">매크로·섹터·뉴스</text>
</g>

<g class="c-purple">
<rect x="250" y="358" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="380" text-anchor="middle">북마크</text>
<text class="ts" x="340" y="398" text-anchor="middle">RAG 적재</text>
</g>

<g class="c-coral">
<rect x="450" y="358" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="540" y="380" text-anchor="middle">자유질의</text>
<text class="ts" x="540" y="398" text-anchor="middle">Tool 반복 호출</text>
</g>

<g class="box">
<rect x="230" y="484" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="506" text-anchor="middle">출력 파서</text>
<text class="ts" x="340" y="524" text-anchor="middle">구조화 응답 생성</text>
</g>

<g class="box">
<rect x="290" y="600" width="100" height="36" rx="18" stroke-width="0.5"/>
<text class="t" x="340" y="622" text-anchor="middle">종료</text>
</g>
</svg>
</body>
</html>
